# Add this file to /etc/nginx/sites-available/ch16.greenhyla.com
# then: ln -s /etc/nginx/sites-available/ch16.greenhyla.com /etc/nginx/sites-enabled/
# and:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name ch16.greenhyla.com;

    # Redirect HTTP → HTTPS (uncomment after SSL cert is issued)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://localhost:8016;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

